<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Master Trainer V6.0 - Multi-Node Update</title>
    <style>
        :root { --neon: #00ffcc; --danger: #ff4444; --bg: #0d0d0f; --card: #1a1a20; --border: #33333d; --warning: #ffaa00; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #f0f0f0; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .main-container { width: 95%; max-width: 900px; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--neon); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }

        .visualizer-container { position: relative; width: 100%; height: 200px; background: #000; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #fftCanvas { transition: opacity 0.4s ease; } /* Animación suave al ocultar */
        #eqCurveCanvas, #userEqCanvas { pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #eqCurveCanvas { z-index: 5; }
        #userEqCanvas { opacity: 1; z-index: 6; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { display: block; font-size: 1.3rem; font-weight: bold; color: var(--neon); }
        .stat-lbl { font-size: 0.65rem; color: #888; text-transform: uppercase; }

        .panel { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid var(--border); }
        
        .setup-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { background: #25252b; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #222; border: 1px solid var(--border); color: #aaa; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-size: 0.85rem; min-width: 80px; transition: 0.2s;}
        .tab-btn:hover { border-color: #666; }
        .tab-btn.active { background: var(--neon); color: #000; font-weight: bold; }
        .tab-btn.tool-btn { background: #1b1b22; border-color: #444; color: #ddd; }

        .action-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-play { background: var(--neon); color: #000; border: none; font-weight: 800; border-radius: 8px; cursor: pointer; height: 50px; font-size: 0.9rem; transition: 0.2s; }
        .btn-play:hover { filter: brightness(1.2); }
        .btn-verify { background: var(--warning); color: #000; border: none; font-weight: 800; border-radius: 8px; cursor: pointer; height: 50px; display: none; transition: 0.2s; }
        .btn-verify:hover { filter: brightness(1.2); }
        .btn-bypass { background: #333; color: white; border: 1px solid #444; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.1s;}
        .btn-bypass.active { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 15px rgba(255,68,68,0.4); }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); gap: 8px; }
        .opt-card { background: #25252b; border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s;}
        .opt-card:hover { border-color: #666; }
        .opt-card.selected { background: #333; border-color: var(--warning); box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        .opt-label { font-size: 0.85rem; font-weight: bold; display: block; pointer-events: none;}

        #feedback { margin-top: 20px; padding: 12px; text-align: center; border-radius: 8px; font-weight: bold; min-height: 20px; background: #222;}
        
        #panTool { height: 80px; background: #111; border: 1px solid var(--border); position: relative; cursor: crosshair; display: none; border-radius: 8px; margin-bottom: 15px;}
        .pan-marker { position: absolute; top: 0; width: 4px; height: 100%; transform: translateX(-50%); }

        #matchEqTool { height: 150px; background: #111; border: 1px solid var(--border); position: relative; cursor: crosshair; display: none; border-radius: 8px; margin-bottom: 15px; overflow: hidden;}
        .axis-label { position: absolute; color: #666; font-size: 10px; pointer-events: none;}
        .match-node { position: absolute; width: 24px; height: 24px; background: var(--warning); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px var(--warning); display: none; opacity: 0.8; transition: transform 0.1s;}
        .match-node.active { transform: translate(-50%, -50%) scale(1.3); opacity: 1; background: var(--neon); box-shadow: 0 0 15px var(--neon);}

        .file-upload { margin-bottom: 15px; font-size: 0.75rem; color: #666; text-align: center; }
        [title] { cursor: help; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>MASTER AUDIO TRAINER <span style="font-weight: 300; font-size: 1rem;">V6.0</span></h1>
            <p style="font-size: 0.9rem; color: #aaa;">Ahora con ejercicios Multi-banda y mayores tolerancias.</p>
        </header>

        <div class="visualizer-container">
            <canvas id="fftCanvas"></canvas>
            <canvas id="eqCurveCanvas"></canvas>
            <canvas id="userEqCanvas"></canvas>
        </div>

        <div class="dashboard">
            <div class="stat-card" title="Puntos acumulados en tus sesiones."><span class="stat-lbl">Puntos</span><span id="score" class="stat-val">0</span></div>
            <div class="stat-card" title="Aciertos consecutivos. ¡No falles!"><span class="stat-lbl">Racha</span><span id="streak" class="stat-val">0</span></div>
            <div class="stat-card" title="Porcentaje general de precisión."><span class="stat-lbl">Aciertos</span><span id="accuracy" class="stat-val">0%</span></div>
        </div>

        <div class="panel">
            <div class="setup-row">
                <select id="diffSelect" onchange="resetStats()" title="Modifica la dificultad. En EQ, cada nivel añade un nodo extra y reduce el margen de error tolerado.">
                    <option value="beginner">Novato (1 Nodo | Gran Tolerancia)</option>
                    <option value="easy">Fácil (2 Nodos | Tolerancia Media)</option>
                    <option value="medium" selected>Medio (3 Nodos | Sin Tolerancia)</option>
                    <option value="pro">Pro (4 Nodos | Masterización)</option>
                    <option value="expert">Master (5 Nodos | Quirúrgico)</option>
                </select>
                <div class="tabs">
                    <button class="tab-btn active" onclick="setTab('eq')" title="Modo Identificación: Selecciona las bandas que crees que han sido alteradas en el reto.">Adivinar EQ</button>
                    <button class="tab-btn" onclick="setTab('match')" title="Modo Práctico: Mueve los nodos para crear una curva que suene exactamente igual a la del reto.">Igualar EQ</button>
                    <button class="tab-btn" onclick="setTab('pan')" title="Modo Espacial: Haz clic para adivinar si el sonido está a la izquierda o a la derecha.">Adivinar PAN</button>
                    <button id="fftToggleBtn" class="tab-btn tool-btn" onclick="toggleFFT()" title="Activa o desactiva la visualización del analizador de frecuencias de fondo.">👁 Analizador</button>
                </div>
            </div>

            <div class="file-upload">
                <input type="file" id="audioLoader" accept="audio/*" title="Sube tu propia pista de audio (WAV, MP3) en lugar del ruido rosa predeterminado, puedes usar un sample de cualquier instrumento para practicar o canciones completas.">
            </div>

            <div class="action-row">
                <button id="playBtn" class="btn-play" onclick="startChallenge()" title="Genera un nuevo ejercicio y comienza la reproducción de audio.">REPRODUCIR RETO</button>
                <button id="verifyBtn" class="btn-verify" onclick="verifyAnswer()" title="Comprueba si tus respuestas o tu curva coinciden con el reto.">VERIFICAR</button>
                <button id="bypassBtn" class="btn-bypass" onmousedown="applyBypass(true)" onmouseup="applyBypass(false)" title="Mantén pulsado o usa la Barra Espaciadora. En 'Igualar EQ' funciona como interruptor A/B (Escuchar Reto vs Escuchar tu EQ).">BYPASS</button>
            </div>

            <div id="options" class="options-grid"></div>
            
            <div id="panTool" onclick="handlePanGuess(event)" title="Haz clic en esta área horizontal para indicar dónde escuchas el sonido.">
                <div style="position:absolute; left:50%; width:1px; height:100%; background:#444;"></div>
                <div id="panActual" class="pan-marker" style="background:var(--neon); display:none; z-index:2;"></div>
                <div id="panGuess" class="pan-marker" style="background:#fff; display:none; z-index:3;"></div>
            </div>

            <div id="matchEqTool" onmousedown="startDrag(event)" title="Haz clic y arrastra los nodos naranjas para intentar replicar el sonido que escuchas en el reto.">
                <div style="position:absolute; left:50%; width:1px; height:100%; background:#333;"></div>
                <div style="position:absolute; top:50%; width:100%; height:1px; background:#333;"></div>
                <span class="axis-label" style="bottom:2px; left:5px;">20Hz</span>
                <span class="axis-label" style="bottom:2px; right:5px;">20kHz</span>
                <span class="axis-label" style="top:5px; left:5px;">+15dB</span>
                <span class="axis-label" style="bottom:15px; left:5px;">-15dB</span>
                <div class="match-node" id="node0"></div>
                <div class="match-node" id="node1"></div>
                <div class="match-node" id="node2"></div>
                <div class="match-node" id="node3"></div>
                <div class="match-node" id="node4"></div>
            </div>

            <div id="feedback">Selecciona un nivel y pulsa Reproducir Reto.</div>
        </div>
    </div>

<script>
    const MAX_NODES = 5;
    const FREQS = [100, 250, 500, 1000, 2500, 5000, 10000];
    
    let audioCtx, source, pinkNoiseBuffer, customBuffer;
    let challengeFilters = [], userFilters = [], pannerNode, gainNode, analyzer;
    let currentTab = 'eq', challengeActive = false, score = 0, totalRounds = 0, hits = 0, streak = 0;
    
    let solutionNodes = []; 
    let userEqState = [];
    let matchStartTime = 0;
    let activeDragNode = null;
    let isBypassing = false;
    let analyzerVisible = true;

    const DIFF_SETTINGS = {
        beginner: { nodes: 1, eqGain: 15, panTol: 0.30, matchTol: { freq: 0.8, gain: 8 }, guessTolIdx: 1 }, 
        easy:     { nodes: 2, eqGain: 10, panTol: 0.20, matchTol: { freq: 0.6, gain: 6 }, guessTolIdx: 1 },
        medium:   { nodes: 3, eqGain: 8,  panTol: 0.12, matchTol: { freq: 0.4, gain: 4 }, guessTolIdx: 0 },
        pro:      { nodes: 4, eqGain: 6,  panTol: 0.08, matchTol: { freq: 0.25, gain: 3 }, guessTolIdx: 0 },
        expert:   { nodes: 5, eqGain: 4,  panTol: 0.04, matchTol: { freq: 0.1, gain: 1 }, guessTolIdx: 0 }
    };

    function playFeedbackSound(isSuccess) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (isSuccess) {
            osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioCtx.createAnalyser(); analyzer.fftSize = 2048;
            
            pannerNode = audioCtx.createStereoPanner();
            gainNode = audioCtx.createGain();

            for(let i=0; i<MAX_NODES; i++) {
                let uf = audioCtx.createBiquadFilter(); uf.type = 'peaking'; uf.Q.value = 2.5;
                let cf = audioCtx.createBiquadFilter(); cf.type = 'peaking'; cf.Q.value = 2.5;
                userFilters.push(uf);
                challengeFilters.push(cf);
            }

            for(let i=0; i<MAX_NODES-1; i++) userFilters[i].connect(userFilters[i+1]);
            userFilters[MAX_NODES-1].connect(challengeFilters[0]);
            for(let i=0; i<MAX_NODES-1; i++) challengeFilters[i].connect(challengeFilters[i+1]);
            
            challengeFilters[MAX_NODES-1].connect(pannerNode).connect(gainNode).connect(analyzer).connect(audioCtx.destination);
            
            generatePinkNoise();
            drawFFT();
        }
    }

    function generatePinkNoise() {
        const bufferSize = 4 * audioCtx.sampleRate;
        pinkNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = pinkNoiseBuffer.getChannelData(0);
        let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
        for (let i = 0; i < bufferSize; i++) {
            let white = Math.random() * 2 - 1;
            b0 = 0.99886 * b0 + white * 0.0555179; b1 = 0.99332 * b1 + white * 0.0750759; b2 = 0.96900 * b2 + white * 0.1538520;
            b3 = 0.86650 * b3 + white * 0.3104856; b4 = 0.55000 * b4 + white * 0.5329522; b5 = -0.7616 * b5 - white * 0.0168980;
            output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.15; b6 = white * 0.115926;
        }
    }

    // CENTRALIZAMOS EL ENRUTAMIENTO DEL AUDIO Y LÓGICA DE BYPASS A/B
    function applyBypass(active) {
        if (!challengeActive) return;
        isBypassing = active;
        document.getElementById('bypassBtn').classList.toggle('active', active);
        
        for(let i=0; i<MAX_NODES; i++) {
            if (currentTab === 'match') {
                if (active) {
                    // Modo BYPASS: Escuchas el RETO (Desactiva tu EQ)
                    challengeFilters[i].gain.value = i < solutionNodes.length ? solutionNodes[i].gain : 0;
                    userFilters[i].gain.value = 0;
                } else {
                    // Modo NORMAL: Escuchas a TU USUARIO (Desactiva el Reto)
                    challengeFilters[i].gain.value = 0;
                    userFilters[i].gain.value = i < userEqState.length ? userEqState[i].gain : 0;
                    if(i < userEqState.length) userFilters[i].frequency.value = userEqState[i].freq;
                }
            } else {
                // Modos normales (Adivinar EQ / PAN): Bypass apaga todo a plano
                if (active) {
                    challengeFilters[i].gain.value = 0;
                    userFilters[i].gain.value = 0;
                } else {
                    if(i < solutionNodes.length && currentTab === 'eq') {
                        challengeFilters[i].gain.value = solutionNodes[i].gain;
                    }
                }
            }
        }
        
        if(currentTab === 'pan') {
            pannerNode.pan.value = active ? 0 : (solutionNodes.length > 0 ? solutionNodes[0].pan : 0);
        }
    }

    function toggleOption(el) {
        if(!challengeActive || currentTab !== 'eq') return;
        el.classList.toggle('selected');
    }

    function toggleFFT() {
        analyzerVisible = !analyzerVisible;
        document.getElementById('fftCanvas').style.opacity = analyzerVisible ? 1 : 0;
        const btn = document.getElementById('fftToggleBtn');
        btn.style.opacity = analyzerVisible ? 1 : 0.6;
    }

    function startChallenge() {
        initAudio();
        challengeActive = true;
        document.getElementById('eqCurveCanvas').style.opacity = 0;
        document.getElementById('userEqCanvas').style.opacity = currentTab === 'match' ? 1 : 0;
        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
        
        document.getElementById('panActual').style.display = 'none';
        document.getElementById('panGuess').style.display = 'none';
        
        for(let i=0; i<MAX_NODES; i++) {
            document.getElementById('node'+i).style.display = 'none';
        }
        userEqState = [];
        solutionNodes = [];
        
        if (source) source.stop();
        source = audioCtx.createBufferSource();
        source.buffer = customBuffer || pinkNoiseBuffer;
        source.loop = true;
        source.connect(userFilters[0]);
        
        const diff = DIFF_SETTINGS[document.getElementById('diffSelect').value];

        if (currentTab === 'eq') {
            let availableFreqs = [...FREQS];
            for(let i=0; i<diff.nodes; i++) {
                let idx = Math.floor(Math.random() * availableFreqs.length);
                let f = availableFreqs.splice(idx, 1)[0];
                let isBoost = Math.random() > 0.5;
                let g = isBoost ? diff.eqGain : -diff.eqGain;
                solutionNodes.push({freq: f, gain: g, isBoost: isBoost});
                challengeFilters[i].frequency.value = f;
            }
            pannerNode.pan.value = 0;
            
        } else if (currentTab === 'match') {
            const minL = Math.log10(50); const maxL = Math.log10(15000);
            const step = (maxL - minL) / diff.nodes;
            
            for(let i=0; i<diff.nodes; i++) {
                let sMin = minL + i*step; let sMax = sMin + step;
                let f = Math.pow(10, sMin + Math.random()*(sMax-sMin));
                let g = (Math.random() * 30) - 15;
                if(Math.abs(g) < 4) g = g > 0 ? 5 : -5;
                
                solutionNodes.push({freq: f, gain: g});
                challengeFilters[i].frequency.value = f;

                userEqState.push({freq: f, gain: 0}); 
                userFilters[i].frequency.value = f; 
                
                let nodeEl = document.getElementById('node'+i);
                nodeEl.style.display = 'block';
                nodeEl.style.left = (getLogPos(Math.pow(10, sMin + step/2), 1) * 100) + '%';
                nodeEl.style.top = '50%';
            }
            matchStartTime = Date.now();
            drawUserEQCurve();
            pannerNode.pan.value = 0;
            
        } else if (currentTab === 'pan') {
            let p = (Math.random() * 1.7) - 0.85;
            solutionNodes.push({pan: p});
        }

        gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.1);
        source.start();
        
        // Configuramos la señal sin bypass al iniciar
        applyBypass(false);

        let msg = currentTab === 'pan' ? "Haz clic en la gráfica para adivinar el PAN." : `Identifica ${diff.nodes} banda(s). Luego presiona VERIFICAR.`;
        document.getElementById('feedback').innerText = msg;
        document.getElementById('feedback').style.color = "#888";
    }

    function verifyAnswer() {
        if (!challengeActive) return;
        if (currentTab === 'eq') checkGuessEq();
        else if (currentTab === 'match') checkMatchEq();
    }

    function checkGuessEq() {
        const diff = DIFF_SETTINGS[document.getElementById('diffSelect').value];
        const selectedEls = document.querySelectorAll('.opt-card.selected');
        
        let userAnswers = [];
        selectedEls.forEach(el => {
            userAnswers.push({freq: parseInt(el.dataset.f), boost: el.dataset.b === 'true'});
        });

        showEQCurve(solutionNodes, 'challenge');

        if (userAnswers.length !== diff.nodes) {
            finalizeRound(false, `Debes seleccionar exactamente ${diff.nodes} opción(es). Seleccionaste ${userAnswers.length}.`);
            return;
        }

        let allMatched = true;
        let usedUserIdx = new Set();

        for(let s=0; s<solutionNodes.length; s++) {
            let sol = solutionNodes[s];
            let solIdx = FREQS.indexOf(sol.freq);
            let found = false;

            for(let u=0; u<userAnswers.length; u++) {
                if(usedUserIdx.has(u)) continue;
                let ans = userAnswers[u];
                let ansIdx = FREQS.indexOf(ans.freq);
                
                if (Math.abs(solIdx - ansIdx) <= diff.guessTolIdx && sol.isBoost === ans.boost) {
                    found = true;
                    usedUserIdx.add(u);
                    break;
                }
            }
            if(!found) { allMatched = false; break; }
        }
        
        let msg = allMatched ? "¡OÍDO MAESTRO!" : "INCORRECTO. Revisa la gráfica naranja.";
        finalizeRound(allMatched, msg);
    }

    window.addEventListener('mousemove', (e) => {
        if(!challengeActive || currentTab !== 'match' || activeDragNode === null) return;
        
        const container = document.getElementById('matchEqTool');
        const rect = container.getBoundingClientRect();
        
        let x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        let y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

        const minLog = Math.log10(20); const maxLog = Math.log10(20000);
        const logFreq = minLog + (x / rect.width) * (maxLog - minLog);
        const freq = Math.pow(10, logFreq);
        const gain = ((rect.height / 2 - y) / (rect.height / 2)) * 15;

        let domNode = document.getElementById('node'+activeDragNode);
        domNode.style.left = x + 'px';
        domNode.style.top = y + 'px';

        userEqState[activeDragNode] = { freq: freq, gain: gain };
        
        // No actualiza el audio si está en pleno Bypass (escuchando el reto)
        if (!isBypassing) {
            userFilters[activeDragNode].frequency.value = freq;
            userFilters[activeDragNode].gain.value = gain;
        }

        drawUserEQCurve();
    });

    window.addEventListener('mouseup', () => {
        if(activeDragNode !== null) {
            document.getElementById('node'+activeDragNode).classList.remove('active');
            activeDragNode = null;
        }
    });

    function startDrag(e) {
        if(!challengeActive || currentTab !== 'match') return;
        const rect = e.currentTarget.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        let closestIdx = -1;
        let minDist = 40; 

        for(let i=0; i<userEqState.length; i++) {
            let n = document.getElementById('node'+i);
            let nx = parseFloat(n.style.left || 0) / 100 * rect.width; 
            if(n.style.left.includes('px')) nx = parseFloat(n.style.left);
            
            let ny = parseFloat(n.style.top || 0) / 100 * rect.height;
            if(n.style.top.includes('px')) ny = parseFloat(n.style.top);

            let dist = Math.sqrt(Math.pow(x-nx,2) + Math.pow(y-ny,2));
            if(dist < minDist) { minDist = dist; closestIdx = i; }
        }

        if(closestIdx !== -1) {
            activeDragNode = closestIdx;
            document.getElementById('node'+closestIdx).classList.add('active');
        }
    }

    function checkMatchEq() {
        const diff = DIFF_SETTINGS[document.getElementById('diffSelect').value];
        let allMatched = true;
        let matchedIndices = new Set();

        for(let s=0; s<solutionNodes.length; s++) {
            let sol = solutionNodes[s];
            let found = false;

            for(let u=0; u<userEqState.length; u++) {
                if(matchedIndices.has(u)) continue;
                let user = userEqState[u];
                
                let fErr = Math.abs(Math.log10(sol.freq) - Math.log10(user.freq));
                let gErr = Math.abs(sol.gain - user.gain);

                if(fErr <= diff.matchTol.freq && gErr <= diff.matchTol.gain) {
                    found = true;
                    matchedIndices.add(u);
                    break;
                }
            }
            if(!found) { allMatched = false; break; }
        }

        showEQCurve(solutionNodes, 'challenge');
        const timeTaken = ((Date.now() - matchStartTime) / 1000).toFixed(1);
        
        let msg = allMatched ? `¡IGUALADO PERFECTO EN ${timeTaken}s!` : "INCORRECTO. Las curvas no coinciden.";
        finalizeRound(allMatched, msg);
    }

    function handlePanGuess(e) {
        if (!challengeActive || currentTab !== 'pan') return;
        const rect = e.currentTarget.getBoundingClientRect();
        const guessVal = ((e.clientX - rect.left) / rect.width * 2) - 1;
        const diff = DIFF_SETTINGS[document.getElementById('diffSelect').value];
        
        let solPan = solutionNodes[0].pan;
        document.getElementById('panActual').style.left = ((solPan + 1) / 2 * 100) + '%';
        document.getElementById('panActual').style.display = 'block';
        document.getElementById('panGuess').style.left = ((guessVal + 1) / 2 * 100) + '%';
        document.getElementById('panGuess').style.display = 'block';

        const error = Math.abs(guessVal - solPan);
        const correct = error < diff.panTol;
        finalizeRound(correct, correct ? "¡BUEN OÍDO ESPACIAL!" : `DESVIADO: Fallaste por ${(error*100).toFixed(0)}%`);
    }

    function finalizeRound(correct, customMsg) {
        challengeActive = false;
        totalRounds++;
        if (correct) { hits++; score += (20 * DIFF_SETTINGS[document.getElementById('diffSelect').value].nodes); streak++; } 
        else { score = Math.max(0, score - 15); streak = 0; }
        
        document.getElementById('score').innerText = score;
        document.getElementById('streak').innerText = streak;
        document.getElementById('accuracy').innerText = Math.round((hits/totalRounds)*100) + '%';
        
        playFeedbackSound(correct);

        const f = document.getElementById('feedback');
        f.innerText = customMsg;
        f.style.color = correct ? "#00ffcc" : "#ff4444";
        f.style.background = correct ? "rgba(0, 255, 204, 0.1)" : "rgba(255, 68, 68, 0.1)";
        
        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
        setTimeout(() => { if (source) source.stop(); f.style.background = "#222"; }, 2000);
    }

    const getLogPos = (freq, w) => { return ((Math.log10(freq) - Math.log10(20)) / (Math.log10(20000) - Math.log10(20))) * w; };

    function getCurveY(x, w, h, nodesArr) {
        let y = h/2;
        nodesArr.forEach(n => {
            if(!n || n.gain === 0) return;
            const centerX = getLogPos(n.freq, w);
            const amplitude = (n.gain / 24) * (h / 2); 
            const dist = Math.abs(x - centerX);
            y -= amplitude * Math.exp(-Math.pow(dist / 40, 2));
        });
        return Math.max(0, Math.min(h, y));
    }

    function drawFFT() {
        const canvas = document.getElementById('fftCanvas');
        const ctx = canvas.getContext('2d');
        const dataArray = new Uint8Array(analyzer.frequencyBinCount);

        function render() {
            requestAnimationFrame(render);
            analyzer.getByteFrequencyData(dataArray);
            const w = canvas.width = canvas.offsetWidth; const h = canvas.height = canvas.offsetHeight;
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, w, h);

            [100, 1000, 10000].forEach(f => {
                const x = getLogPos(f, w);
                ctx.strokeStyle = '#222'; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                ctx.fillStyle = '#444'; ctx.font = '10px Inter'; ctx.fillText(f >= 1000 ? (f/1000)+'k' : f, x, h - 5);
            });

            ctx.beginPath(); ctx.strokeStyle = '#1a3a3a'; ctx.lineWidth = 2;
            for (let i = 0; i < analyzer.frequencyBinCount; i++) {
                const freq = i * (audioCtx.sampleRate / 2) / analyzer.frequencyBinCount;
                if (freq < 20) continue;
                const x = getLogPos(freq, w); const y = h - (dataArray[i] / 255) * h;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        render();
    }

    function showEQCurve(nodesArr, type='challenge') {
        const canvas = document.getElementById('eqCurveCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth; const h = canvas.height = canvas.offsetHeight;
        
        ctx.clearRect(0, 0, w, h);
        ctx.beginPath();
        ctx.strokeStyle = type === 'challenge' ? '#ffaa00' : '#00ffcc';
        ctx.lineWidth = 3; ctx.setLineDash([5, 5]);

        for(let x=0; x<w; x++) {
            let y = getCurveY(x, w, h, nodesArr);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke(); ctx.setLineDash([]);
        canvas.style.opacity = 1;
    }

    function drawUserEQCurve() {
        const canvas = document.getElementById('userEqCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth; const h = canvas.height = canvas.offsetHeight;
        
        ctx.clearRect(0, 0, w, h);
        ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 2;

        for(let x=0; x<w; x++) {
            let y = getCurveY(x, w, h, userEqState);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    function setTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('options').style.display = t === 'eq' ? 'grid' : 'none';
        document.getElementById('panTool').style.display = t === 'pan' ? 'block' : 'none';
        document.getElementById('matchEqTool').style.display = t === 'match' ? 'block' : 'none';
        
        document.getElementById('verifyBtn').style.display = (t === 'eq' || t === 'match') ? 'block' : 'none';
        document.getElementById('userEqCanvas').style.opacity = t === 'match' ? 1 : 0;
        
        if(t === 'eq') renderOptions();
    }

    function renderOptions() {
        const container = document.getElementById('options');
        container.innerHTML = "";
        FREQS.forEach(f => {
            const label = f >= 1000 ? (f/1000)+'kHz' : f+'Hz';
            container.innerHTML += `<div class="opt-card" data-f="${f}" data-b="true" onclick="toggleOption(this)" title="Indica un aumento (boost) en ${label}"><span class="opt-label">${label} +</span></div>`;
            container.innerHTML += `<div class="opt-card" data-f="${f}" data-b="false" onclick="toggleOption(this)" title="Indica una atenuación (corte) en ${label}"><span class="opt-label" style="color:var(--danger)">${label} -</span></div>`;
        });
    }

    function resetStats() { score = 0; streak = 0; totalRounds = 0; hits = 0; finalizeRound(null, "Dificultad cambiada. Puntuación reiniciada."); }

    document.getElementById('audioLoader').onchange = function(e) {
        initAudio();
        const reader = new FileReader();
        reader.onload = (ev) => audioCtx.decodeAudioData(ev.target.result, b => customBuffer = b);
        reader.readAsArrayBuffer(this.files[0]);
    };

    // CONTROL GLOBAL DE LA BARRA ESPACIADORA
    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space') {
            e.preventDefault(); // Evita pulsar botones accidentalmente
            if(!isBypassing && challengeActive) applyBypass(true);
        }
    });

    window.addEventListener('keyup', (e) => {
        if(e.code === 'Space') {
            e.preventDefault();
            if(challengeActive) applyBypass(false);
        }
    });
    
    renderOptions();
    document.getElementById('verifyBtn').style.display = 'block';
</script>
</body>
</html>
